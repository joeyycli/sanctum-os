#!/usr/sbin/nft -f
# Sanctum OS firewall — default deny inbound, allow outbound.
# Loaded by nftables.service at boot.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Established / related return traffic
        ct state established,related accept

        # Drop invalid early
        ct state invalid drop

        # ICMP: rate-limited essentials only (path MTU, NDP for IPv6)
        ip protocol icmp icmp type { destination-unreachable, time-exceeded, parameter-problem } limit rate 10/second accept
        ip6 nexthdr ipv6-icmp icmpv6 type { destination-unreachable, packet-too-big, time-exceeded, parameter-problem, nd-neighbor-solicit, nd-neighbor-advert, nd-router-advert } limit rate 20/second accept

        # DHCPv6 client replies
        ip6 daddr fe80::/64 udp dport 546 ct state new accept

        # Everything else inbound: silently dropped (no listening services anyway)
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
