# Sanctum OS — bootloader identity and hardened kernel command line.
# Sourced by /etc/default/grub on both the live system and installed systems
# (Calamares copies this into the target before grub-install).

GRUB_DISTRIBUTOR="Sanctum"
GRUB_TIMEOUT=2
GRUB_TIMEOUT_STYLE=hidden

# Hardening flags (arm64-appropriate; KPTI is always-on on arm64):
#  - lockdown=integrity: kernel refuses runtime modification paths (kexec, /dev/mem, ...)
#  - init_on_alloc/free: zero memory on allocation and free (use-after-free mitigation)
#  - slab_nomerge: keep slab caches separate to frustrate heap exploitation
#  - page_alloc.shuffle: randomize page allocator freelists
#  - randomize_kstack_offset: per-syscall kernel stack offset randomization
#  - vsyscall/pti flags are x86-only and intentionally absent
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash lockdown=integrity init_on_alloc=1 init_on_free=1 slab_nomerge page_alloc.shuffle=1 randomize_kstack_offset=on"
