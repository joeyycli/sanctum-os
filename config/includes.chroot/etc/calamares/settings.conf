# Sanctum OS — Calamares settings.
# Based on calamares-settings-debian 13.0.13-1 (trixie): same module chain,
# Sanctum branding, plus one extra shellprocess step (sanctum) that prepares
# persistent journald and best-effort preinstalls Claude Desktop in the target.
---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
- id:       sanctum
  module:   shellprocess
  config:   shellprocess-sanctum.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - luksbootkeyfile
  - dpkg-unsafe-io
  - sources-media
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader-config
  - grubcfg
  - bootloader
  - packages
  - plymouthcfg
  - initramfscfg
  - initramfs
  - shellprocess@sanctum
  - dpkg-unsafe-io-undo
  - sources-media-unmount
  - sources-final
  - umount
- show:
  - finished

branding: sanctum

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
