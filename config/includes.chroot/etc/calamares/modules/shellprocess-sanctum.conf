# Sanctum OS — post-install finishing touches, run in the target chroot.
# Commands prefixed with "-" may fail without aborting the install
# (e.g. no network during installation — sanctum-provision.service
# completes the Claude Desktop fetch on first boot instead).
---
dontChroot: false
timeout: 900
script:
    # Installed systems keep a bounded persistent journal (live boots are RAM-only).
    - command: "mkdir -p /var/log/journal"

    # Best-effort Claude Desktop preinstall so the dock is complete at first
    # login when the installer had network. The target chroot has no resolver,
    # so point resolv.conf at Quad9 temporarily and restore the
    # systemd-resolved symlink afterwards.
    - command: "-sh -c 'rm -f /etc/resolv.conf; echo nameserver 9.9.9.9 > /etc/resolv.conf'"
    - command: "-apt-get update"
    - command: "-apt-get install -y claude-desktop"
    - command: "-sh -c 'rm -f /etc/resolv.conf; ln -s /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf'"
