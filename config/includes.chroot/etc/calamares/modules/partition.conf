# Sanctum OS — partitioning defaults.
# Debian trixie does not override partition.conf, so this file layers cleanly
# on Calamares' own defaults. Key choice: LUKS2 full-disk encryption is
# PRE-SELECTED for automated ("Erase disk") installs — the user can untick it,
# but the secure path is the default path.
---
efiSystemPartition: "/boot/efi"

initialPartitioningChoice: erase
allowManualPartitioning: true

# zram provides swap; no disk swap partition (nothing secret ever swaps to disk
# unencrypted, and resume-from-disk is pointless in a VM).
userSwapChoices:
    - none
initialSwapChoice: none

defaultFileSystemType: "ext4"
availableFileSystemTypes: ["ext4"]

enableLuksAutomatedPartitioning: true
preCheckEncryption: true
luksGeneration: luks2

defaultPartitionTableType: gpt
