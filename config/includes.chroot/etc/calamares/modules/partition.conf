# Sanctum OS — partitioning defaults.
# Debian trixie does not override partition.conf, so this file layers cleanly
# on Calamares' own defaults. Key choice: full-disk encryption is PRE-SELECTED
# for automated ("Erase disk") installs — the user can untick it, but the
# secure path is the default path.
#
# LUKS version: luks1, deliberately. Calamares' automated encrypted layout
# places /boot inside the encrypted root, so GRUB itself must unlock the
# container — and trixie's GRUB 2.12 can only open LUKS1 (or LUKS2+PBKDF2;
# cryptsetup's LUKS2 default is argon2id, which GRUB <2.14 cannot parse).
# luks2 here would produce an unbootable system. Revisit when Debian ships
# GRUB >= 2.14.
---
efiSystemPartition: "/boot/efi"

initialPartitioningChoice: erase
allowManualPartitioning: true

# zram provides swap; no disk swap partition (nothing secret ever swaps to disk
# unencrypted, and resume-from-disk is pointless in a VM).
userSwapChoices:
    - none
initialSwapChoice: none

defaultFileSystemType: "ext4"
availableFileSystemTypes: ["ext4"]

enableLuksAutomatedPartitioning: true
preCheckEncryption: true
luksGeneration: luks1

defaultPartitionTableType: gpt
