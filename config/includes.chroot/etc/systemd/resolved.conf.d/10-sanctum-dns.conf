# Sanctum OS — encrypted DNS by default.
# Quad9: Swiss nonprofit, no personal-data logging, blocks known
# malware/phishing domains at the resolver. Changeable in Settings ▸ Network.
[Resolve]
DNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net
FallbackDNS=
DNSOverTLS=yes
DNSSEC=allow-downgrade
