# Sanctum OS — NetworkManager privacy defaults
[main]
dns=systemd-resolved
systemd-resolved=true

[device]
# Randomize MAC while scanning Wi-Fi (no-op in a VM, protects on bare metal)
wifi.scan-rand-mac-address=yes

[connection]
# Stable per-network random MAC for Wi-Fi connections
wifi.cloned-mac-address=stable
ethernet.cloned-mac-address=preserve
# IPv6 privacy extensions (RFC 4941)
ipv6.ip6-privacy=2

[connectivity]
# No captive-portal probing phone-home by default
enabled=false
