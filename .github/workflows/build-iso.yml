name: Build Sanctum OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build aarch64 ISO
    # Free native arm64 runners for public repos — the build is native, no emulation.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    container:
      image: debian:trixie
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          chmod +x build/*.sh auto/* config/hooks/normal/*.hook.chroot \
                   config/includes.chroot/usr/local/sbin/* 2>/dev/null || true
          ./build/build.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctum-os-iso
          path: |
            dist/*.iso
            dist/SHA256SUMS
          compression-level: 0
          if-no-files-found: error

      - name: Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.iso
            dist/SHA256SUMS
          generate_release_notes: true
