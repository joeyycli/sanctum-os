<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 224">
  <title>Sanctum lockup</title>
  <desc>
    Horizontal lockup: the aperture glyph followed by the SANCTUM wordmark.
    The wordmark is hand-drawn geometric capitals rendered as stroked paths
    (never a text element), so rasterization is independent of installed
    fonts. Cap height 96, stroke 9 (light weight), tracking 36 - generous,
    quiet letter-spacing. Canvas is 880x224, exactly 4x the 220x56 GDM
    render target.
  </desc>
  <!-- aperture glyph, scaled 0.4 and centered at (102,112) -->
  <g transform="translate(102 112) scale(0.4) translate(-256 -256)">
    <g fill="none" stroke="#1A1A1E" stroke-linecap="round">
      <path d="M 392.78 145.24 A 176 176 0 1 1 366.76 119.22" stroke-width="20"/>
      <circle cx="256" cy="256" r="110" stroke-width="18"/>
    </g>
    <circle cx="256" cy="256" r="37" fill="#1A1A1E"/>
  </g>
  <!-- SANCTUM wordmark: letters drawn on a 96-high cap grid, baseline y=160 -->
  <g fill="none" stroke="#1A1A1E" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
     transform="translate(0 64)">
    <!-- S: two r=24 arcs, top bowl opening right, bottom bowl opening left -->
    <path d="M 266.78 12 A 24 24 0 1 0 246 48 A 24 24 0 1 1 225.22 84"/>
    <!-- A: apex + legs, crossbar at y=64 -->
    <path d="M 308 96 L 338 0 L 368 96 M 320.5 64 L 355.5 64"/>
    <!-- N -->
    <path d="M 404 96 L 404 0 L 464 96 L 464 0"/>
    <!-- C: elliptical arc rx=30 ry=48, opening right -->
    <path d="M 551.21 14.06 A 30 48 0 1 0 551.21 81.94"/>
    <!-- T -->
    <path d="M 596 0 L 656 0 M 626 0 L 626 96"/>
    <!-- U: stems into a r=30 bowl -->
    <path d="M 692 0 L 692 66 A 30 30 0 0 0 752 66 L 752 0"/>
    <!-- M: apex depth 60 -->
    <path d="M 788 96 L 788 0 L 818 60 L 848 0 L 848 96"/>
  </g>
</svg>
